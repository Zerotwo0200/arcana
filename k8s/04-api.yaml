apiVersion: apps/v1
kind: Deployment
metadata:
  name: arcana-api
  namespace: arcana
spec:
  replicas: 2
  selector:
    matchLabels:
      app: arcana-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: arcana-api
    spec:
      containers:
        - name: arcana-api
          image: arcana-api:latest
          imagePullPolicy: Never   # для Minikube (локальный образ)
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: arcana-config
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: arcana-secret
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: arcana-api-service
  namespace: arcana
spec:
  selector:
    app: arcana-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
